<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>accordionパネルの作成</title>
</head>
<body>
  <!-- アコーディオンパネルに必須のタグ details -->
  <!-- 各detailsに同じname="XXX"を指定するとトグルになり、ほかの項目を開いたときに閉じてくれる -->
  <details name="accordion">
    <!-- 見えてる部分を囲むタグ summary -->
    <summary>特徴1</summary>
    <p>特徴の詳細</p>
  </details>

    <details name="accordion">
    <summary>特徴2</summary>
    <p>特徴の詳細</p>
  </details>

    <details name="accordion">
    <summary>特徴3</summary>
    <p>特徴の詳細</p>
  </details>

</body>
</html>
